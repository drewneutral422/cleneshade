name: PR Test-Only Auto Approval

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post comments or approve
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          # Define the filter: anything NOT in the tests folder
          files_ignore: |
            tests/**
            .github/workflows/** # Optional: ignore changes to this script too

      - name: Evaluate Changes
        if: steps.changed-files.outputs.any_changed == 'false'
        run: |
          echo "Only test files changed. Auto-approving..."
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Auto-approved: Changes are restricted to the tests folder."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Manual Review Required
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Non-test files detected. Manual signature/review required."
          gh pr comment ${{ github.event.pull_request.number }} --body "⚠️ Manual review required: This PR modifies files outside the 'tests/' directory."
          exit 1 # Fails the check, preventing merge if you have branch protection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
